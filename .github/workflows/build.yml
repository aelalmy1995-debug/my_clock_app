name: Build Flet APK
on:
  push:
    branches: [ main ] # تأكد أن هذا هو اسم فرعك الرئيسي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        run: |
          # سيقوم flet build بتحويل الكود واستخدام ملف build.yaml تلقائياً
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clock-app
          path: build/apk/*.apk
