name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flet
        pip install -r requirements.txt
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
    
    - name: Create APK
      run: |
       mkdir -p dist 
       flet pack main.py 
       find . -name "*.apk" -exec mv {} dist/ \; 
       ls -la dist/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4  # ✅ تم التحديث إلى v4
      with:
        name: my-clock-app
        path: dist/*.apk
        compression-level: 0  # اختياري: لتحسين سرعة الرفع
        if-no-files-found: error
